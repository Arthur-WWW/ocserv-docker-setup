# Authentication
auth = "plain[passwd=/etc/ocserv/config/ocpasswd]"

# TCP and UDP port number
tcp-port = 443
udp-port = 443

# Socket file
socket-file = /var/run/ocserv-socket

# The key and the certificates of the server
server-cert = /etc/ocserv/certs/server-cert.pem
server-key = /etc/ocserv/certs/server-key.pem

# Worker isolation
# Must be false in Docker containers to avoid seccomp syscall clashes with the host
isolate-workers = false

# Maximum number of clients
max-clients = 16
max-same-clients = 5

# Rate limiting
rate-limit-ms = 100

# Keepalive and Dead Peer Detection
keepalive = 32400
dpd = 90
mobile-dpd = 1800
switch-to-tcp-timeout = 25

# MTU Discovery
try-mtu-discovery = false
mtu = 1280
output-buffer = 16

# Authentication timeout
auth-timeout = 240
cookie-timeout = 300

# Banning clients
max-ban-score = 80
ban-time = 300
ban-reset-time = 1200

# Security (TLS Priorities)
tls-priorities = "NORMAL:%SERVER_PRECEDENCE:%COMPAT:-VERS-SSL3.0:-VERS-TLS1.0:-VERS-TLS1.1"

# Client Compatibility
cisco-client-compat = true
client-bypass-protocol = false

# The name to use for the tun device
device = vpns

# Predictable IPs
predictable-ips = true

# Compression
# Per the ocserv manpage, compression should be kept disabled for security
# (VORACLE-style compression side-channel attacks). It is also the default.
compression = false

# IPv4 subnet for VPN clients. entrypoint.sh derives the default NAT
# source CIDR from this value unless VPN_IPV4_CIDR overrides it.
ipv4-network = 192.168.211.0/24

# Optional IPv6 full tunnel. Leave disabled unless your VPS has working IPv6
# egress and VPN_IPV6_MODE=nat is set in docker-compose.yml.
# ipv6-network = fda9:4efe:7e3b:03ea::/64
# ipv6-subnet-prefix = 128

# DNS settings
tunnel-all-dns = true
dns = 8.8.8.8
dns = 1.1.1.1

# Routing
# 'default' routes all traffic through the VPN (Full Tunnel)
route = default
