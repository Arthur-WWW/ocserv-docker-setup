services:
  ocserv:
    build: .
    container_name: ocserv_server
    restart: unless-stopped
    # Use host network mode for maximum UDP/DTLS performance.
    # This bypasses Docker's userland proxy (docker-proxy) which causes severe bottlenecks and UDP fragmentation drops.
    network_mode: host
    cap_add:
      - NET_ADMIN
    devices:
      - "/dev/net/tun:/dev/net/tun"
    environment:
      # Uncomment and set DOMAIN to your actual domain to enable Let's Encrypt auto-certs via acme.sh
      # - DOMAIN=vpn.example.com
      # If DOMAIN is not set, self-signed certificates will be generated using these values:
      - CA_CN=VPN CA
      - CA_ORG=My Corp
      - SRV_CN=vpn.example.com
      - SRV_ORG=My Corp
    volumes:
      - ./config:/etc/ocserv/config
      - ./certs:/etc/ocserv/certs
