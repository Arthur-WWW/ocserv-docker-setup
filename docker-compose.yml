services:
  ocserv:
    build: .
    container_name: ocserv_server
    restart: unless-stopped
    ports:
      - "443:443/tcp"
      - "443:443/udp"
      # Uncomment to enable Let's Encrypt certificate issuance via acme.sh
      # standalone mode. Port 80 must be free on the host and reachable from
      # the public internet for the ACME http-01 challenge to succeed.
      # - "80:80/tcp"
    cap_add:
      - NET_ADMIN
    devices:
      - "/dev/net/tun:/dev/net/tun"
    sysctls:
      - net.ipv4.ip_forward=1
    security_opt:
      - no-new-privileges:true
    environment:
      # Uncomment and set DOMAIN to your actual domain to enable Let's Encrypt auto-certs via acme.sh.
      # When DOMAIN is set, ACME_EMAIL is also required (used for the Let's Encrypt account
      # and certificate expiry notices).
      # - DOMAIN=vpn.example.com
      # - ACME_EMAIL=admin@example.com
      # If DOMAIN is not set, self-signed certificates will be generated using these values:
      - CA_CN=VPN CA
      - CA_ORG=My Corp
      - SRV_CN=vpn.example.com
      # Optional SANs for self-signed certificates. Leave commented for the original CN-only behavior.
      # - SRV_DNS=vpn.example.com
      # - SRV_IP=203.0.113.10
      - SRV_ORG=My Corp
      # Defaults to the ipv4-network CIDR in config/ocserv.conf when unset.
      # - VPN_IPV4_CIDR=192.168.211.0/24
      # Keep off unless config/ocserv.conf IPv6 settings are also enabled.
      - VPN_IPV6_MODE=off
      # - VPN_IPV6_CIDR=fda9:4efe:7e3b:03ea::/64
    volumes:
      - ./config:/etc/ocserv/config
      - ./certs:/etc/ocserv/certs
    # Cap log growth so a long-running server can't fill the host disk.
    # ocserv runs at -d 1 (debug-level) which is verbose, so this is a real risk.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
